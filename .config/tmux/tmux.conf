# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal / color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-ghostty:RGB'
set -g extended-keys on
set -as terminal-features ',xterm-ghostty:extkeys'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Windows / panes
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on
setw -g mode-keys vi

# Window navigation
bind -n M-H previous-window
bind -n M-L next-window

# Pane navigation works without requiring TPM on a new machine. If vim/fzf is
# active, pass the key through so vim-tmux-navigator can handle editor splits.
bind -n C-h if-shell 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$"' 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$"' 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$"' 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$"' 'send-keys C-l' 'select-pane -R'

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# Splits start in the current pane's directory.
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Tmux sessionizer
bind-key C-f run-shell "~/bin/tmux-sessionizer"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Status bar design
set -g status on
set -g status-style "bg=black,fg=white"
set -g status-left-length 40
set -g status-right-length 60

# Left status
set -g status-left "#[fg=black,bg=white,bold] #S #[fg=white,bg=black] "

# Window status - Add zoom indicator
set-window-option -g window-status-format "#[fg=white,bg=black] #I #W#{?window_zoomed_flag, [Z],} "
set-window-option -g window-status-current-format "#[fg=black,bg=white,bold] #I #W#{?window_zoomed_flag, [Z],} "

# Right status - Battery, Date, and Time
set -g status-right "#[fg=white,bg=black]#{battery_percentage} #[fg=white,bg=black]%d-%b #[fg=black,bg=white,bold] %H:%M "

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=white"

# Message style
set -g message-style "fg=white,bg=black,bold"

# Initialize TMUX plugin manager if it was installed manually.
if-shell '[ -x "$HOME/.tmux/plugins/tpm/tpm" ]' 'run-shell "$HOME/.tmux/plugins/tpm/tpm"'

# Resize panes with prefix + C-{h,j,k,l} (after TPM to avoid tmux-sensible overriding C-l)
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1
