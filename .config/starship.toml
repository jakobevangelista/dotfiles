# Text symbols only for tmux compatibility.
"$schema" = "https://starship.rs/config-schema.json"

format = "$directory${custom.jj}$git_branch$git_commit$git_state$git_status$kubernetes$aws$docker_context$package$bun$nodejs$golang$python$rust$c$lua$buf$terraform$nix_shell$cmd_duration$line_break$jobs$character"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " ro"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = ""
only_attached = true

[git_commit]
disabled = true

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[custom.jj]
command = '''
jj log --ignore-working-copy --no-graph --color never -r @ -T 'separate(" ", if(local_bookmarks, local_bookmarks.map(|b| b.name()).join(","), change_id.shortest(8)), description.first_line().substr(0, 24))'
'''
when = "jj root >/dev/null 2>&1"
format = '[$symbol$output]($style) '
symbol = "jj "
style = "bold purple"

[aws]
format = '\[[$symbol($profile)(\($region\))]($style)\] '
symbol = "aws "

[bun]
format = '\[[$symbol($version)]($style)\] '
symbol = "bun "

[docker_context]
format = '\[[$symbol$context]($style)\] '
symbol = "docker "

[golang]
format = '\[[$symbol($version)]($style)\] '
symbol = "go "

[kubernetes]
format = '\[[$symbol$context( \($namespace\))]($style)\] '
symbol = "k8s "
disabled = false
detect_env_vars = []
detect_extensions = []
detect_files = ["Chart.yaml", "kustomization.yaml", "kustomization.yml", "helmfile.yaml", "helmfile.yml"]
detect_folders = ["k8s", "kubernetes", "helm", "charts"]

[nix_shell]
format = '\[[$symbol$state( \($name\))]($style)\] '
symbol = "nix "

[nodejs]
format = '\[[$symbol($version)]($style)\] '
symbol = "node "

[package]
format = '\[[$symbol$version]($style)\] '
symbol = "pkg "

[python]
format = '\[[$symbol($version)(\($virtualenv\))]($style)\] '
symbol = "py "

[rust]
format = '\[[$symbol($version)]($style)\] '
symbol = "rs "

[terraform]
format = '\[[$symbol$workspace]($style)\] '
symbol = "tf "

[c]
format = '\[[$symbol($version)]($style)\] '
symbol = "c "

[lua]
format = '\[[$symbol($version)]($style)\] '
symbol = "lua "

[buf]
format = '\[[$symbol($version)]($style)\] '
symbol = "buf "

[cmd_duration]
format = "[$duration]($style) "
min_time = 2000
