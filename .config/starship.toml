# Starship prompt config — text symbols only (no emojis) for tmux compatibility

# Single-line prompt
[line_break]
disabled = true

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$symbol$branch]($style) "
symbol = ""

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
format = "[$duration]($style) "
min_time = 2000

# --- Active modules (text symbols, no emojis) ---

[aws]
format = '\[[$symbol($profile)(\($region\))]($style)\] '
symbol = "aws "

[bun]
format = '\[[$symbol($version)]($style)\] '
symbol = "bun "

[docker_context]
format = '\[[$symbol$context]($style)\] '
symbol = "docker "

[golang]
format = '\[[$symbol($version)]($style)\] '
symbol = "go "

[kubernetes]
format = '\[[$symbol$context( \($namespace\))]($style)\] '
symbol = "k8s "
disabled = false
detect_env_vars = []
detect_extensions = []
detect_files = ["Chart.yaml", "kustomization.yaml", "kustomization.yml", "helmfile.yaml", "helmfile.yml"]
detect_folders = ["k8s", "kubernetes", "helm", "charts"]

[nix_shell]
format = '\[[$symbol$state( \($name\))]($style)\] '
symbol = "nix "

[nodejs]
format = '\[[$symbol($version)]($style)\] '
symbol = "node "

[package]
format = '\[[$symbol$version]($style)\] '
symbol = "pkg "

[python]
format = '\[[$symbol($version)(\($virtualenv\))]($style)\] '
symbol = "py "

[rust]
format = '\[[$symbol($version)]($style)\] '
symbol = "rs "

[terraform]
format = '\[[$symbol$workspace]($style)\] '
symbol = "tf "

[c]
format = '\[[$symbol($version)]($style)\] '
symbol = "c "

[lua]
format = '\[[$symbol($version)]($style)\] '
symbol = "lua "

[buf]
format = '\[[$symbol($version)]($style)\] '
symbol = "buf "

